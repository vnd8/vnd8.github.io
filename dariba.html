<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة رسوم تحويل USDT</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-color: #f3ba2f;
            --text-color: #ffffff;
            --accent-color: #0ecb81;
            --danger-color: #f6465d;
            --sub-text: #888888;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #bbb;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .results {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #333;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            background-color: #252525;
            padding: 12px;
            border-radius: 8px;
        }

        .result-label {
            color: #ccc;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .result-value-container {
            text-align: left;
        }

        .result-value {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-color);
            display: block;
        }

        .fee-value { color: var(--danger-color); }
        .usdt-value { color: var(--accent-color); font-size: 1.2rem; }
        .dzd-value { color: var(--primary-color); font-size: 1.3rem; }

    </style>
</head>
<body>

<div class="container">
    <h2>حاسبة USDT والدينار</h2>
    
    <div class="input-group">
        <label>المبلغ الأساسي (USD)</label>
        <input type="number" id="amount" placeholder="أدخل المبلغ هنا" value="100" oninput="calculate()">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
            <label>الرسوم (%)</label>
            <input type="number" id="feeRate" step="0.01" value="6.29" oninput="calculate()">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>سعر الصرف (DZD)</label>
            <input type="number" id="dzdRate" value="240" oninput="calculate()">
        </div>
    </div>

    <div class="results">
        <div class="result-item">
            <span class="result-label">الضريبة المقتطعة:</span>
            <div class="result-value-container">
                <span class="result-value fee-value" id="feeAmountUSD">0.00 $</span>
            </div>
        </div>

        <div class="result-item">
            <span class="result-label">الصافي الذي ستستلمه:</span>
            <div class="result-value-container">
                <span class="result-value usdt-value" id="netAmountUSDT">0.00 USDT</span>
            </div>
        </div>

        <div class="result-item" style="border: 1px solid var(--primary-color); background-color: rgba(243, 186, 47, 0.05);">
            <span class="result-label">المبلغ بالدينار (بعد الضريبة):</span>
            <div class="result-value-container">
                <span class="result-value dzd-value" id="netDZD">0 DZD</span>
            </div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const amount = parseFloat(document.getElementById('amount').value) || 0;
        const feeRate = parseFloat(document.getElementById('feeRate').value) || 0;
        const dzdRate = parseFloat(document.getElementById('dzdRate').value) || 0;

        // حسابات الدولار
        const feeAmountUSD = amount * (feeRate / 100);
        const netAmountUSDT = amount - feeAmountUSD;

        // حساب الدينار بناءً على الصافي (المبلغ بعد الضريبة)
        const netDZD = netAmountUSDT * dzdRate;

        // تحديث الواجهة
        document.getElementById('feeAmountUSD').innerText = feeAmountUSD.toFixed(2) + ' $';
        document.getElementById('netAmountUSDT').innerText = netAmountUSDT.toFixed(2) + ' USDT';
        
        // استخدام toLocaleString لإضافة فواصل الآلاف
        document.getElementById('netDZD').innerText = netDZD.toLocaleString('en-US') + ' DZD';
    }

    // التشغيل المبدئي
    calculate();
</script>

</body>
</html>
